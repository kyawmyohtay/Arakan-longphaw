<!DOCTYPE html>
<html lang="my"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"><title>Arakan Lotto</title><style>body{margin:0;font-family:sans-serif;background:#f0f2f5;padding:10px}header{text-align:center;background:#1e3a8a;color:#fff;padding:10px;border-radius:12px;margin-bottom:15px}header h1{margin:0;font-size:20px}.box{border-radius:16px;padding:12px;margin-bottom:12px;color:#000}.box h2{margin:0 0 10px 0;font-size:16px;color:#fff;display:inline-block;padding:5px 14px;border-radius:8px}.numbers{display:grid;gap:8px;font-size:18px;font-weight:bold;text-align:center}.numbers span{background:#fff;padding:10px;border-radius:10px;box-shadow:0 2px 4px rgba(0,0,0,.1)}.p1{background:linear-gradient(90deg,#fde047,#facc15)}.p1 h2{background:#4f46e5}.p2{background:linear-gradient(90deg,#fb923c,#f97316)}.p2 h2{background:#059669}.p3{background:linear-gradient(90deg,#7dd3fc,#38bdf8)}.p3 h2{background:#0ea5e9}.p4{background:linear-gradient(90deg,#fca5a5,#ef4444)}.p4 h2{background:#dc2626}.p5{background:linear-gradient(90deg,#d1d5db,#a3a3a3)}.p5 h2{background:#4b5563}.p6{background:linear-gradient(90deg,#a7f3d0,#10b981)}.p6 h2{background:#065f46}.n3{grid-template-columns:repeat(3,1fr)}.n4{grid-template-columns:repeat(4,1fr);font-size:16px}#loading{text-align:center;padding:50px;color:#64748b}</style></head><body><header><h1>🎰 အာရက္ခလောင်းပေါက်ပဲမင်း</h1><p id="date"></p></header><main id="results"><div id="loading">Loading...</div></main><script>const SHEET_CSV_URL="PASTE_YOUR_CSV_LINK_HERE";const prizeOrder=['ပထမဆု','ဒုတိယဆု','တတိယဆု','စတုတ္ထဆု','ပဉ္စမဆု','ဆုကြီး'];const prizeClass={'ပထမဆု':'p1','ဒုတိယဆု':'p2','တတိယဆု':'p3','စတုတ္ထဆု':'p4','ပဉ္စမဆု':'p5','ဆုကြီး':'p6'};const gridClass={'ပထမဆု':'n3','ဒုတိယဆု':'n3','တတိယဆု':'n3','စတုတ္ထဆု':'n3','ပဉ္စမဆု':'n3','ဆုကြီး':'n4'};fetch(SHEET_CSV_URL).then(res=>res.text()).then(csv=>{const rows=csv.split("\n").slice(1);const data={};rows.forEach(r=>{const [date,num,,prize]=r.split(",");if(!date||!prize||!num)return;if(!data[date])data[date]={};if(!data[date][prize])data[date][prize]=[];data[date][prize].push(num.trim())});const latestDate=Object.keys(data).sort().reverse()[0];document.getElementById('date').innerText='နေ့စွဲ: '+latestDate;const wrap=document.getElementById('results');wrap.innerHTML='';prizeOrder.forEach(prize=>{if(!data[latestDate][prize])return;const box=document.createElement('div');box.className=`box ${prizeClass[prize]}`;box.innerHTML=`<h2>${prize} သိန်းပေါင်း</h2><div class="numbers ${gridClass[prize]}">${data[latestDate][prize].map(n=>`<span>${n}</span>`).join('')}</div>`;wrap.appendChild(box)})}).catch(()=>document.getElementById('loading').innerText="Internet ချိတ်ဆက်မှု စစ်ဆေးပါ");</script></body></html>
